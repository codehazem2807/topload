<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب صيانة غسالات - TopLoad</title>
    <meta name="description" content="طلب صيانة غسالات في الاسكندرية والساحل الشمالي. املأ النموذج وسنقوم بالرد خلال 30 دقيقة.">
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* ===== CSS Variables ===== */
        :root {
            --primary-dark: #0A1128;
            --primary-blue: #1A237E;
            --gold: #FFD700;
            --orange: #FF6B35;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --radius: 20px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--primary-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--primary-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--gold), var(--orange));
            border-radius: 10px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== Particles ===== */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== Navbar ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            padding: 15px 0;
            background: rgba(10, 17, 40, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar .logo i {
            -webkit-text-fill-color: var(--gold);
            margin-left: 8px;
        }

        .navbar .back-link {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            transition: var(--transition);
        }

        .navbar .back-link:hover {
            color: var(--gold);
        }

        .navbar .back-link i {
            margin-left: 8px;
        }

        /* ===== Main Content ===== */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 80px;
            position: relative;
            z-index: 1;
        }

        .request-wrapper {
            width: 100%;
            max-width: 800px;
        }

        .request-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .request-header .icon {
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-bottom: 10px;
        }

        .request-header h1 {
            font-size: 2.5rem;
            font-weight: 900;
        }

        .request-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
        }

        /* ===== Form ===== */
        .request-form {
            padding: 40px;
        }

        .request-form .form-group {
            margin-bottom: 20px;
        }

        .request-form label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .request-form label .required {
            color: var(--orange);
        }

        .request-form input,
        .request-form select,
        .request-form textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: var(--transition);
            outline: none;
        }

        .request-form input:focus,
        .request-form select:focus,
        .request-form textarea:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.05);
        }

        .request-form input::placeholder,
        .request-form textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .request-form select option {
            background: var(--primary-dark);
            color: #fff;
        }

        .request-form textarea {
            resize: vertical;
            min-height: 120px;
        }

        .request-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .request-form .gps-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: var(--gold);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Cairo', sans-serif;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
        }

        .request-form .gps-btn:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        .request-form .gps-btn .fa-spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(10, 17, 40, 0.2);
            border-top: 3px solid var(--primary-dark);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .btn-submit.loading .spinner {
            display: block;
        }

        .btn-submit.loading .btn-text {
            display: none;
        }

        .form-success {
            display: none;
            padding: 20px;
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid #2ecc71;
            border-radius: 12px;
            text-align: center;
            margin-top: 20px;
        }

        .form-success.show {
            display: block;
            animation: fadeUp 0.5s ease;
        }

        .form-success .icon {
            font-size: 3rem;
            color: #2ecc71;
        }

        .form-success h3 {
            color: #2ecc71;
            margin: 10px 0;
        }

        .form-success p {
            color: rgba(255, 255, 255, 0.7);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 18px 30px;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            z-index: 10001;
            transform: translateX(120%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow);
            font-family: 'Cairo', sans-serif;
            max-width: 400px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .toast.error {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        .toast.info {
            background: linear-gradient(135deg, var(--primary-blue), #0A1128);
            border: 1px solid var(--gold);
        }

        /* ===== Footer ===== */
        .footer {
            padding: 30px 0;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 1;
            margin-top: auto;
        }

        .footer p {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
        }

        .footer a {
            color: var(--gold);
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .request-header h1 {
                font-size: 1.8rem;
            }
            .request-form .form-row {
                grid-template-columns: 1fr;
            }
            .request-form {
                padding: 20px;
            }
            .navbar .logo {
                font-size: 1.4rem;
            }
            .navbar .back-link span {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .request-header h1 {
                font-size: 1.5rem;
            }
            .request-form {
                padding: 15px;
            }
            .btn-submit {
                font-size: 1rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== PARTICLES ===== -->
    <canvas id="particles-canvas"></canvas>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast"></div>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-wrench"></i> TopLoad
            </a>
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-right"></i> <span>العودة للرئيسية</span>
            </a>
        </div>
    </nav>

    <!-- ===== MAIN ===== -->
    <main class="main">
        <div class="request-wrapper">
            <div class="request-header" data-aos="fade-up">
                <span class="icon"><i class="fas fa-tools"></i></span>
                <h1>طلب صيانة غسالات</h1>
                <p>املأ النموذج وسنقوم بالرد عليك خلال 30 دقيقة</p>
            </div>

            <form class="request-form glass-card" id="requestForm" data-aos="fade-up" data-aos-delay="100" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName">الاسم كاملاً <span class="required">*</span></label>
                        <input type="text" id="fullName" placeholder="أدخل اسمك" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">رقم التليفون <span class="required">*</span></label>
                        <input type="tel" id="phone" placeholder="مثال: 01012345678" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">العنوان</label>
                    <input type="text" id="address" placeholder="شارع، رقم المبنى، الحي">
                </div>

                <div class="form-group">
                    <label for="area">
                        المنطقة <span class="required">*</span>
                        <button type="button" class="gps-btn" id="gpsBtn">
                            <i class="fas fa-location-dot"></i> تحديد الموقع
                        </button>
                    </label>
                    <select id="area" required>
                        <option value="">-- اختر المنطقة --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="problem">وصف المشكلة</label>
                    <textarea id="problem" placeholder="صف المشكلة بالتفصيل (اختياري)"></textarea>
                </div>

                <button type="submit" class="btn-primary btn-submit" id="submitBtn">
                    <span class="btn-text"><i class="fas fa-paper-plane"></i> إرسال الطلب</span>
                    <span class="spinner"></span>
                </button>

                <div class="form-success" id="formSuccess">
                    <div class="icon"><i class="fas fa-check-circle"></i></div>
                    <h3>تم إرسال طلبك بنجاح!</h3>
                    <p>سنقوم بالتواصل معك خلال 30 دقيقة. شكراً لثقتك بـ TopLoad.</p>
                    <a href="index.html" class="btn-secondary" style="margin-top:15px;display:inline-block;padding:10px 30px;font-size:0.9rem;">
                        <i class="fas fa-arrow-right"></i> العودة للرئيسية
                    </a>
                </div>
            </form>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <p>© 2025 <a href="index.html">TopLoad</a> - صيانة غسالات الاسكندرية والساحل الشمالي</p>
        </div>
    </footer>

    <!-- ===== SCRIPTS ===== -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // =====================================================
        // 1. AOS
        // =====================================================
        AOS.init({ once: true, duration: 800 });

        // =====================================================
        // 2. Particles
        // =====================================================
        (function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.speedY = (Math.random() - 0.5) * 0.5;
                    this.opacity = Math.random() * 0.5 + 0.1;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) {
                        this.reset();
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 215, 0, ${this.opacity})`;
                    ctx.fill();
                }
            }

            const count = Math.min(80, Math.floor((w * h) / 15000));
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // =====================================================
        // 3. Areas List
        // =====================================================
        const AREAS = [
            // Alexandria - East
            'المنتزه', 'سيدي بشر', 'ميامي', 'كليوباترا', 'الشاطبي',
            'الابراهيمية', 'زيزينيا', 'سبورتنج', 'سموحة', 'كامب شيزار',
            'جناكليس', 'فيكتوريا', 'الرمل',
            // Alexandria - West
            'بحري', 'العجمي', 'محرم بك', 'القباري', 'الدخيلة',
            'العامرية', 'برج العرب', 'الورديان',
            // Alexandria - Central / North
            'الظاهرية', 'العطارين', 'المنشية', 'الحضرة', 'السيوف',
            'الانفوشي', 'القلعة', 'كوم الدكة',
            // North Coast
            'مراسى', 'العلمين', 'سيدي عبد الرحمن', 'رأس الحكمة',
            'الضبعة', 'الحمام', 'مطروح', 'السلوم', 'سيدي براني',
            'النجيلة', 'فوكة', 'مارينا', 'جرين بيتش', 'سان ستيفانو',
            'كريستال بيتش'
        ];

        const areaSelect = document.getElementById('area');
        AREAS.forEach(area => {
            const opt = document.createElement('option');
            opt.value = area;
            opt.textContent = area;
            areaSelect.appendChild(opt);
        });

        // =====================================================
        // 4. Supabase
        // =====================================================
        const SUPABASE_URL = 'https://uzcllseejydmpwzsygjp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6Y2xsc2VlanlkbXB3enN5Z2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3MTM5MzMsImV4cCI6MjEwMDI4OTkzM30.uRxevCNLHM2OSqCRBcnmOHsmhFOgSiphBqKGaw261wA';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // =====================================================
        // 5. Toast
        // =====================================================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toast._hideTimeout);
            toast._hideTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 4500);
        }

        // =====================================================
        // 6. GPS Location
        // =====================================================
        const gpsBtn = document.getElementById('gpsBtn');

        gpsBtn.addEventListener('click', function() {
            const icon = this.querySelector('i');
            icon.className = 'fas fa-spinner fa-spin';

            if (!navigator.geolocation) {
                showToast('متصفحك لا يدعم تحديد الموقع', 'error');
                icon.className = 'fas fa-location-dot';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    try {
                        const resp = await fetch(
                            `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json&accept-language=ar`
                        );
                        const data = await resp.json();
                        let matchedArea = '';
                        let locationName = '';

                        if (data && data.address) {
                            const parts = [];
                            if (data.address.city) parts.push(data.address.city);
                            if (data.address.town) parts.push(data.address.town);
                            if (data.address.village) parts.push(data.address.village);
                            if (data.address.suburb) parts.push(data.address.suburb);
                            if (data.address.road) parts.push(data.address.road);
                            locationName = parts.join(' - ') || data.display_name || 'موقعك الحالي';

                            for (const area of AREAS) {
                                if (locationName.includes(area)) {
                                    matchedArea = area;
                                    break;
                                }
                            }

                            if (!matchedArea) {
                                for (const area of AREAS) {
                                    if (locationName.includes(area.substring(0, 3))) {
                                        matchedArea = area;
                                        break;
                                    }
                                }
                            }
                        }

                        if (matchedArea) {
                            document.getElementById('area').value = matchedArea;
                            showToast(`✅ تم تحديد منطقتك: ${matchedArea}`, 'success');
                        } else {
                            showToast('📍 تعذر تحديد المنطقة، اخترها يدوياً', 'info');
                        }
                    } catch (e) {
                        showToast('❌ حدث خطأ في تحديد الموقع', 'error');
                    }
                    icon.className = 'fas fa-location-dot';
                },
                () => {
                    showToast('يرجى السماح بتحديد الموقع أو اختيار المنطقة يدوياً', 'info');
                    icon.className = 'fas fa-location-dot';
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        });

        // Try auto-location after 2 seconds
        setTimeout(() => gpsBtn.click(), 2000);

        // =====================================================
        // 7. Form Submit to Supabase
        // =====================================================
        const form = document.getElementById('requestForm');
        const submitBtn = document.getElementById('submitBtn');
        const successDiv = document.getElementById('formSuccess');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const area = document.getElementById('area').value;
            const problem = document.getElementById('problem').value.trim();

            if (!fullName || !phone || !area) {
                showToast('⚠️ الاسم ورقم التليفون والمنطقة مطلوبة', 'error');
                return;
            }

            if (phone.length < 10) {
                showToast('⚠️ رقم التليفون غير صحيح', 'error');
                return;
            }

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            successDiv.classList.remove('show');

            try {
                const { data, error } = await supabase
                    .from('maintenance_requests')
                    .insert([{
                        full_name: fullName,
                        phone: phone,
                        address: address || null,
                        area: area,
                        problem_description: problem || null,
                        status: 'جديد',
                        created_at: new Date().toISOString()
                    }])
                    .select();

                if (error) throw error;

                successDiv.classList.add('show');
                showToast('✅ تم إرسال طلبك بنجاح!', 'success');
                form.querySelectorAll('input, textarea, select').forEach(el => {
                    if (el.type !== 'submit') el.value = '';
                });

            } catch (err) {
                console.error('Supabase Error:', err);
                showToast('❌ حدث خطأ أثناء الإرسال، حاول مرة أخرى', 'error');
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });

        console.log('📝 TopLoad - صفحة طلب الصيانة');
        console.log('📍 مناطق مخدومة:', AREAS.length);
    </script>
</body>
</html>
