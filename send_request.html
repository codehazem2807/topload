<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>طلب صيانة غسالات · TopLoad</title>
  <!-- Google Fonts: Cairo -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <!-- Font Awesome 6.5.0 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  <style>
    /* ----- RESET & BASE (RTL) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Cairo', sans-serif;
      background: #0a0e1a;
      color: #f0f4fa;
      min-height: 100vh;
      overflow-x: hidden;
      padding-top: 80px;
    }
    html {
      scroll-behavior: smooth;
    }
    /* ----- BACKGROUND LAYER (animated orbs + particles) ----- */
    #bg-layer {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: linear-gradient(145deg, #0a0e1a 0%, #1B3A6B 100%);
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.45;
      animation: floatOrb 22s infinite alternate ease-in-out;
    }
    .orb-1 {
      width: 550px;
      height: 550px;
      background: #D4A843;
      top: -8%;
      left: -6%;
      animation-duration: 26s;
    }
    .orb-2 {
      width: 480px;
      height: 480px;
      background: #E85D3A;
      bottom: -5%;
      right: -4%;
      animation-duration: 20s;
      animation-delay: -4s;
    }
    .orb-3 {
      width: 420px;
      height: 420px;
      background: #2C5F8A;
      top: 40%;
      right: 20%;
      animation-duration: 24s;
      animation-delay: -8s;
      opacity: 0.3;
    }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, -40px) scale(1.1); }
    }
    /* particles canvas */
    #particles-canvas {
      position: fixed;
      inset: 0;
      z-index: -1;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ----- GLASSMORPHISM HELPERS ----- */
    .glass {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }
    .glass-form {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      border: 1px solid rgba(255, 215, 100, 0.15);
      border-radius: 40px;
      padding: 2.2rem 2rem;
      transition: all 0.3s ease;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
    }
    .glass-form:hover {
      border-color: rgba(212, 168, 67, 0.4);
      box-shadow: 0 40px 70px rgba(212, 168, 67, 0.15);
    }

    /* ----- NAVBAR (fixed, glass) ----- */
    .navbar {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 2.5rem;
      background: rgba(10, 14, 26, 0.55);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .logo-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D4A843, #E85D3A);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      color: #0a0e1a;
      box-shadow: 0 0 0 2px rgba(212, 168, 67, 0.3);
      overflow: hidden;
    }
    .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .logo-text {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(135deg, #D4A843, #E85D3A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .btn-back {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #f0f4fa;
      padding: 0.5rem 1.3rem;
      border-radius: 60px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
    }
    .btn-back i {
      transform: scaleX(-1);
    }
    .btn-back:hover {
      border-color: #D4A843;
      color: #D4A843;
      background: rgba(212, 168, 67, 0.08);
      transform: translateX(-4px);
    }

    /* ----- HEADER ----- */
    .hero-header {
      text-align: center;
      margin: 1.5rem 0 2.5rem;
    }
    .icon-circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(212,168,67,0.2), rgba(27,58,107,0.3));
      backdrop-filter: blur(4px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      color: #D4A843;
      border: 1px solid rgba(212,168,67,0.2);
      margin-bottom: 12px;
      box-shadow: 0 0 40px rgba(212,168,67,0.1);
    }
    .hero-title {
      font-size: 2.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #D4A843, #E85D3A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .hero-sub {
      font-size: 1.1rem;
      color: #ccd9f0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px 12px;
    }
    .gold-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #D4A843;
      border-radius: 50%;
      margin: 0 4px;
    }
    .highlight-text {
      color: #D4A843;
      font-weight: 700;
    }

    /* ----- FORM ----- */
    .form-container {
      max-width: 800px;
      margin: 0 auto 3rem;
      padding: 0 1.2rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #e8edf9;
      font-size: 0.95rem;
      letter-spacing: 0.2px;
    }
    .form-control {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #d0d7e6;
      color: #0a0e1a;
      font-size: 1rem;
      font-family: 'Cairo', sans-serif;
      transition: all 0.25s ease;
      outline: none;
    }
    .form-control:focus {
      border-color: #D4A843;
      box-shadow: 0 0 0 4px rgba(212, 168, 67, 0.2);
      background: #ffffff;
    }
    .form-control::placeholder {
      color: #8a94a8;
      font-weight: 300;
    }
    textarea.form-control {
      min-height: 110px;
      resize: vertical;
    }

    /* location button */
    .btn-location {
      background: transparent;
      border: 1.5px solid #D4A843;
      color: #D4A843;
      padding: 0.7rem 1.6rem;
      border-radius: 60px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: 0.25s ease;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      margin-top: 0.25rem;
    }
    .btn-location:hover {
      background: rgba(212, 168, 67, 0.1);
      box-shadow: 0 0 20px rgba(212, 168, 67, 0.2);
      transform: translateY(-2px);
    }
    .btn-location i {
      font-size: 1.1rem;
    }
    .btn-location:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* submit button */
    .btn-submit {
      width: 100%;
      padding: 1.1rem;
      border: none;
      border-radius: 60px;
      background: linear-gradient(135deg, #D4A843, #E85D3A);
      color: #0a0e1a;
      font-weight: 800;
      font-size: 1.25rem;
      font-family: 'Cairo', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2);
      cursor: pointer;
      margin-top: 1rem;
      box-shadow: 0 8px 25px rgba(212, 168, 67, 0.25);
    }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 20px 40px rgba(212, 168, 67, 0.4);
    }
    .btn-submit:active:not(:disabled) {
      transform: scale(0.97);
    }
    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .btn-submit i {
      font-size: 1.2rem;
    }
    .spinner-hidden {
      display: none;
    }

    /* success message */
    .success-box {
      text-align: center;
      padding: 2.5rem 1.5rem;
      display: none;
    }
    .success-box .check-icon {
      font-size: 70px;
      color: #4caf84;
      animation: bouncePop 0.6s ease;
    }
    @keyframes bouncePop {
      0% { transform: scale(0.2); opacity: 0; }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ----- TOAST (top-right) ----- */
    .toast-container {
      position: fixed;
      top: 90px;
      left: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 380px;
      width: 90%;
    }
    .toast {
      padding: 1rem 1.5rem;
      border-radius: 20px;
      background: rgba(20, 25, 45, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
      animation: slideIn 0.3s ease;
      transition: opacity 0.3s;
    }
    .toast.success { border-right: 6px solid #4caf84; }
    .toast.error { border-right: 6px solid #f44336; }
    .toast.info { border-right: 6px solid #2C5F8A; }
    .toast i { font-size: 24px; }
    .toast.success i { color: #4caf84; }
    .toast.error i { color: #f44336; }
    .toast.info i { color: #6ab0f7; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ----- FLOATING BUTTONS ----- */
    .floating-buttons {
      position: fixed;
      bottom: 30px;
      left: 25px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 900;
    }
    .float-btn {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: none;
      color: #fff;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
      transition: all 0.2s ease;
      cursor: pointer;
      position: relative;
    }
    .float-btn:hover {
      transform: scale(1.08);
    }
    .float-btn .tooltip {
      position: absolute;
      left: 72px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.9rem;
      white-space: nowrap;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
      color: #fff;
    }
    .float-btn:hover .tooltip {
      opacity: 1;
      transform: translateX(4px);
    }
    .float-btn.whatsapp { background: #25D366; animation: pulse 2.2s infinite; }
    .float-btn.call { background: #E85D3A; }
    .float-btn.home { background: linear-gradient(135deg, #D4A843, #E85D3A); color: #0a0e1a; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5); }
      70% { box-shadow: 0 0 0 16px rgba(37, 211, 102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }

    /* ----- FOOTER ----- */
    .footer {
      text-align: center;
      padding: 2rem 1rem 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.04);
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #b0bedb;
    }
    .footer a {
      color: #D4A843;
      text-decoration: none;
      font-weight: 600;
    }
    .footer a:hover { text-decoration: underline; }

    /* responsive */
    @media (max-width: 700px) {
      .navbar { padding: 0.6rem 1.2rem; flex-wrap: wrap; gap: 8px; }
      .logo-text { font-size: 1.4rem; }
      .btn-back { padding: 0.3rem 1rem; font-size: 0.85rem; }
      .hero-title { font-size: 2rem; }
      .glass-form { padding: 1.5rem 1.2rem; }
      .float-btn { width: 50px; height: 50px; font-size: 22px; }
      .floating-buttons { bottom: 20px; left: 18px; gap: 12px; }
    }
    @media (max-width: 480px) {
      .hero-title { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <!-- BACKGROUND ORBS + PARTICLES -->
  <div id="bg-layer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <canvas id="particles-canvas"></canvas>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="logo-wrapper">
      <div class="logo-circle" id="logoContainer">
        <img src="logo.png" alt="TopLoad" id="logoImg" style="display:none;" />
        <span id="logoFallback">T</span>
      </div>
      <span class="logo-text">TopLoad</span>
    </div>
    <button class="btn-back" id="backHomeBtn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</button>
  </nav>

  <!-- TOAST container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- MAIN CONTENT -->
  <main>
    <div class="hero-header" data-aos="fade-down">
      <div class="icon-circle"><i class="fas fa-tools"></i></div>
      <h1 class="hero-title">طلب صيانة غسالات</h1>
      <div class="hero-sub">
        <span>املأ النموذج وسنقوم بالرد عليك خلال</span>
        <span class="gold-dot"></span>
        <span class="highlight-text">30 دقيقة</span>
        <span class="gold-dot"></span>
        <span>خدمة سريعة واحترافية</span>
      </div>
    </div>

    <div class="form-container" data-aos="fade-up" data-aos-delay="60">
      <div class="glass-form" id="formGlass">
        <!-- FORM -->
        <form id="requestForm" novalidate>
          <div class="form-group">
            <label for="fullName"><i class="fas fa-user" style="margin-left:8px;color:#D4A843;"></i>الاسم كاملاً</label>
            <input type="text" id="fullName" class="form-control" placeholder="أدخل اسمك الثلاثي" required minlength="3" />
            <div style="font-size:0.8rem;color:#e85d3a;margin-top:4px;" id="nameError"></div>
          </div>
          <div class="form-group">
            <label for="phone"><i class="fas fa-phone-alt" style="margin-left:8px;color:#D4A843;"></i>رقم التليفون</label>
            <input type="tel" id="phone" class="form-control" placeholder="مثال: 01012345678" required minlength="10" />
            <div style="font-size:0.8rem;color:#e85d3a;margin-top:4px;" id="phoneError"></div>
          </div>
          <div class="form-group">
            <label for="address"><i class="fas fa-map-pin" style="margin-left:8px;color:#D4A843;"></i>العنوان والمنطقة</label>
            <input type="text" id="address" class="form-control" placeholder="العنوان التفصيلي والمنطقة" required />
            <div style="font-size:0.8rem;color:#e85d3a;margin-top:4px;" id="addressError"></div>
          </div>
          <div class="form-group">
            <button type="button" class="btn-location" id="locateBtn"><i class="fas fa-crosshairs"></i> تحديد الموقع تلقائياً</button>
            <div style="font-size:0.8rem;color:#8a94a8;margin-top:6px;">
              <i class="fas fa-info-circle"></i> سيتم ملء العنوان والمنطقة تلقائياً
            </div>
          </div>
          <div class="form-group">
            <label for="problemDesc"><i class="fas fa-pen" style="margin-left:8px;color:#D4A843;"></i>وصف المشكلة</label>
            <textarea id="problemDesc" class="form-control" placeholder="صف المشكلة بالتفصيل..."></textarea>
          </div>
          <button type="submit" class="btn-submit" id="submitBtn">
            <i class="fas fa-paper-plane"></i> إرسال الطلب
            <span id="submitSpinner" class="spinner-hidden"><i class="fas fa-spinner fa-spin"></i></span>
          </button>
        </form>
        <!-- SUCCESS -->
        <div class="success-box" id="successBox">
          <div class="check-icon"><i class="fas fa-check-circle"></i></div>
          <h2 style="margin:12px 0 4px;color:#D4A843;">تم إرسال طلبك بنجاح!</h2>
          <p style="color:#ccd9f0;font-size:1.1rem;">شكراً لك، سنتواصل معك خلال 30 دقيقة.</p>
          <button class="btn-back" style="margin:20px auto 0;border-color:#D4A843;color:#D4A843;" id="successBackBtn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>© 2026 TopLoad · <a href="#" id="footerHomeLink">الرئيسية</a></p>
    </footer>
  </main>

  <!-- FLOATING BUTTONS -->
  <div class="floating-buttons">
    <button class="float-btn whatsapp" id="whatsappBtn"><i class="fab fa-whatsapp"></i><span class="tooltip">واتساب</span></button>
    <button class="float-btn call" id="callBtn"><i class="fas fa-phone"></i><span class="tooltip">اتصال</span></button>
    <button class="float-btn home" id="floatHomeBtn"><i class="fas fa-home"></i><span class="tooltip">الرئيسية</span></button>
  </div>

  <!-- SUPABASE SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- AOS -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <script>
    (function(){
      // ========== INIT AOS ==========
      AOS.init({ duration: 700, once: true, mirror: false });

      // ========== LOGO ==========
      const logoImg = document.getElementById('logoImg');
      const logoFallback = document.getElementById('logoFallback');
      
      // Try to load logo.png
      logoImg.onload = function() {
        logoImg.style.display = 'block';
        logoFallback.style.display = 'none';
      };
      logoImg.onerror = function() {
        logoImg.style.display = 'none';
        logoFallback.style.display = 'flex';
      };
      // Set src to trigger load/error
      logoImg.src = 'logo.png';

      // ========== SUPABASE ==========
      const supabaseUrl = 'https://uzcllseejydmpwzsygjp.supabase.co';
      const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6Y2xsc2VlanlkbXB3enN5Z2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3MTM5MzMsImV4cCI6MjEwMDI4OTkzM30.uRxevCNLHM2OSqCRBcnmOHsmhFOgSiphBqKGaw261wA';
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      // ========== DOM REFS ==========
      const form = document.getElementById('requestForm');
      const fullName = document.getElementById('fullName');
      const phone = document.getElementById('phone');
      const address = document.getElementById('address');
      const problemDesc = document.getElementById('problemDesc');
      const locateBtn = document.getElementById('locateBtn');
      const submitBtn = document.getElementById('submitBtn');
      const spinner = document.getElementById('submitSpinner');
      const successBox = document.getElementById('successBox');
      const formGlass = document.getElementById('formGlass');
      const toastContainer = document.getElementById('toastContainer');
      const nameError = document.getElementById('nameError');
      const phoneError = document.getElementById('phoneError');
      const addressError = document.getElementById('addressError');

      // ========== TOAST ==========
      function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        const iconMap = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle' };
        toast.innerHTML = `<i class="fas ${iconMap[type] || 'fa-info-circle'}"></i> ${message}`;
        toastContainer.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = '0';
          setTimeout(() => toast.remove(), 300);
        }, 5000);
        document.addEventListener('keydown', function escHandler(e) {
          if (e.key === 'Escape') {
            toast.remove();
            document.removeEventListener('keydown', escHandler);
          }
        });
      }

      // ========== GEOLOCATION ==========
      locateBtn.addEventListener('click', function() {
        locateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جارٍ تحديد الموقع...';
        locateBtn.disabled = true;
        
        if (!navigator.geolocation) {
          showToast('المتصفح لا يدعم تحديد الموقع', 'error');
          locateBtn.innerHTML = '<i class="fas fa-crosshairs"></i> تحديد الموقع تلقائياً';
          locateBtn.disabled = false;
          return;
        }
        
        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            const { latitude, longitude } = pos.coords;
            try {
              // Use Nominatim to get address
              const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json&accept-language=ar`);
              const data = await resp.json();
              
              let fullAddress = data.display_name || '';
              // Extract area/city from address
              const addressParts = fullAddress.split(',').map(s => s.trim());
              let area = '';
              
              // Try to find area from address parts
              const areaKeywords = ['الإسكندرية', 'الساحل الشمالي', 'مرسى مطروح', 'العلمين', 'سيدي عبد الرحمن', 
                                   'رأس الحكمة', 'فوكة', 'الضبعة', 'نجيلة', 'الحمام', 'سيدي كرير', 'برج العرب'];
              
              for (let part of addressParts) {
                for (let keyword of areaKeywords) {
                  if (part.includes(keyword)) {
                    area = part;
                    break;
                  }
                }
                if (area) break;
              }
              
              // If no area found, use the first part
              if (!area && addressParts.length > 0) {
                area = addressParts[0];
              }
              
              // Build full address with area
              let finalAddress = fullAddress;
              if (area && !fullAddress.includes(area)) {
                finalAddress = area + '، ' + fullAddress;
              }
              
              address.value = finalAddress;
              showToast(`تم تحديد الموقع: ${area || 'تم تحديث العنوان'}`, 'success');
            } catch (e) {
              showToast('حدث خطأ في تحديد الموقع، حاول يدوياً', 'error');
            }
            locateBtn.innerHTML = '<i class="fas fa-crosshairs"></i> تحديد الموقع تلقائياً';
            locateBtn.disabled = false;
          },
          (err) => {
            let errorMsg = 'يرجى السماح بالوصول إلى الموقع';
            if (err.code === 1) errorMsg = 'تم رفض الوصول إلى الموقع، يرجى السماح به';
            else if (err.code === 2) errorMsg = 'الموقع غير متاح حالياً';
            else if (err.code === 3) errorMsg = 'انتهت مهلة تحديد الموقع';
            showToast(errorMsg, 'error');
            locateBtn.innerHTML = '<i class="fas fa-crosshairs"></i> تحديد الموقع تلقائياً';
            locateBtn.disabled = false;
          },
          { enableHighAccuracy: true, timeout: 15000 }
        );
      });

      // ========== VALIDATION ==========
      function validateForm() {
        let valid = true;
        
        if (fullName.value.trim().length < 3) {
          nameError.textContent = 'الاسم يجب أن يكون 3 أحرف على الأقل';
          valid = false;
        } else nameError.textContent = '';
        
        const phoneVal = phone.value.trim();
        if (phoneVal.length < 10 || !/^\d+$/.test(phoneVal)) {
          phoneError.textContent = 'رقم التليفون يجب أن يكون 10 أرقام على الأقل';
          valid = false;
        } else phoneError.textContent = '';
        
        if (address.value.trim().length < 3) {
          addressError.textContent = 'الرجاء إدخال العنوان والمنطقة';
          valid = false;
        } else addressError.textContent = '';
        
        return valid;
      }

      // ========== FORM SUBMIT ==========
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!validateForm()) {
          showToast('يرجى تصحيح الأخطاء في النموذج', 'error');
          return;
        }
        
        submitBtn.disabled = true;
        spinner.classList.remove('spinner-hidden');
        submitBtn.querySelector('i.fa-paper-plane').style.display = 'none';

        const payload = {
          full_name: fullName.value.trim(),
          phone: phone.value.trim(),
          address: address.value.trim(),
          problem_description: problemDesc.value.trim() || 'لا يوجد وصف',
          status: 'جديد'
        };

        try {
          const { data, error } = await supabase
            .from('maintenance_requests')
            .insert([payload]);
          
          if (error) throw error;
          
          form.style.display = 'none';
          successBox.style.display = 'block';
          showToast('تم إرسال طلبك بنجاح!', 'success');
          successBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } catch (err) {
          console.error('Supabase error:', err);
          showToast('فشل الإرسال: ' + (err.message || 'خطأ في الشبكة'), 'error');
        } finally {
          submitBtn.disabled = false;
          spinner.classList.add('spinner-hidden');
          submitBtn.querySelector('i.fa-paper-plane').style.display = 'inline';
        }
      });

      // ========== RESET TO FORM ==========
      function resetToForm() {
        form.style.display = 'block';
        successBox.style.display = 'none';
        form.reset();
        // Clear errors
        nameError.textContent = '';
        phoneError.textContent = '';
        addressError.textContent = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
      
      document.getElementById('successBackBtn').addEventListener('click', resetToForm);
      document.getElementById('backHomeBtn').addEventListener('click', resetToForm);
      document.getElementById('footerHomeLink').addEventListener('click', (e) => { 
        e.preventDefault(); 
        resetToForm(); 
      });
      document.getElementById('floatHomeBtn').addEventListener('click', resetToForm);

      // ========== FLOATING BUTTONS ==========
      document.getElementById('whatsappBtn').addEventListener('click', () => {
        window.open('https://wa.me/201234567890', '_blank');
      });
      document.getElementById('callBtn').addEventListener('click', () => {
        window.location.href = 'tel:+201234567890';
      });

      // ========== PARTICLES (canvas) ==========
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let w, h;
      function resize() { 
        w = canvas.width = window.innerWidth; 
        h = canvas.height = window.innerHeight; 
      }
      resize();
      window.addEventListener('resize', resize);

      const particles = [];
      const count = 120;
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 1.8 + 0.8,
          dx: (Math.random() - 0.5) * 0.25,
          dy: (Math.random() - 0.5) * 0.25,
          alpha: Math.random() * 0.6 + 0.2,
        });
      }
      
      function drawParticles() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => {
          p.x += p.dx;
          p.y += p.dy;
          if (p.x < 0 || p.x > w) p.dx *= -1;
          if (p.y < 0 || p.y > h) p.dy *= -1;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
          ctx.fill();
        });
        requestAnimationFrame(drawParticles);
      }
      drawParticles();

      // Close toasts on Escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          const toasts = toastContainer.querySelectorAll('.toast');
          toasts.forEach(t => { 
            t.style.opacity = '0'; 
            setTimeout(() => t.remove(), 300); 
          });
        }
      });

    })();
  </script>
</body>
</html>
