<html lang="ar" dir="rtl">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* ============================================================
           CSS VARIABLES
           ============================================================ */
        :root {
            --primary-dark: #0A1128;
            --primary-blue: #1A237E;
            --gold: #FFD700;
            --orange: #FF6B35;
            --gold-light: #FFE082;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            --radius: 20px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --font-arabic: 'Cairo', sans-serif;
        }

        /* ============================================================
           RESET & BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-arabic);
            background: var(--primary-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--primary-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--gold), var(--orange));
            border-radius: 10px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ============================================================
           PARTICLES
           ============================================================ */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ============================================================
           NAVBAR
           ============================================================ */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            padding: 12px 0;
            background: rgba(10, 17, 40, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.08);
            transition: var(--transition);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.6rem;
            font-weight: 900;
        }

        .navbar .logo .logo-wrapper {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--gold);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
            transition: var(--transition);
            flex-shrink: 0;
        }

        .navbar .logo .logo-wrapper::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--orange), var(--gold));
            background-size: 300% 300%;
            animation: rotate-border 4s linear infinite;
            z-index: -1;
        }

        @keyframes rotate-border {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .navbar .logo .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
            position: relative;
            z-index: 1;
        }

        .navbar .logo .brand-text {
            background: linear-gradient(135deg, var(--gold), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.4rem;
        }

        .navbar .back-link {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .navbar .back-link:hover {
            color: var(--gold);
        }

        .navbar .back-link i {
            transition: var(--transition);
        }

        .navbar .back-link:hover i {
            transform: translateX(-5px);
        }

        /* ============================================================
           MAIN CONTENT
           ============================================================ */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 100px;
            position: relative;
            z-index: 1;
            min-height: 100vh;
        }

        .request-wrapper {
            width: 100%;
            max-width: 820px;
        }

        .request-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .request-header .icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 107, 53, 0.1));
            border: 1px solid rgba(255, 215, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            transition: var(--transition);
        }

        .request-header .icon-wrapper .icon {
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .request-header h1 {
            font-size: 2.4rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .request-header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.05rem;
            margin-top: 5px;
        }

        /* ============================================================
           FORM
           ============================================================ */
        .request-form {
            padding: 40px;
        }

        .request-form .form-group {
            margin-bottom: 22px;
        }

        .request-form label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
        }

        .request-form label .required {
            color: var(--orange);
            font-size: 1.1rem;
        }

        .request-form label .label-icon {
            color: var(--gold);
            font-size: 0.9rem;
        }

        .request-form input,
        .request-form select,
        .request-form textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: var(--font-arabic);
            transition: var(--transition);
            outline: none;
        }

        .request-form input:focus,
        .request-form select:focus,
        .request-form textarea:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.04);
        }

        .request-form input::placeholder,
        .request-form textarea::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .request-form select option {
            background: var(--primary-dark);
            color: #fff;
            padding: 10px;
        }

        .request-form textarea {
            resize: vertical;
            min-height: 120px;
        }

        .request-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* GPS Button */
        .request-form .gps-btn {
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.15);
            color: var(--gold);
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-arabic);
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-right: 8px;
        }

        .request-form .gps-btn:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: var(--gold);
        }

        .request-form .gps-btn .fa-spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 5px;
        }

        .btn-submit .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(10, 17, 40, 0.15);
            border-top: 3px solid var(--primary-dark);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .btn-submit.loading .spinner {
            display: block;
        }

        .btn-submit.loading .btn-text {
            display: none;
        }

        /* Success Message */
        .form-success {
            display: none;
            padding: 30px;
            background: rgba(46, 204, 113, 0.06);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: 16px;
            text-align: center;
            margin-top: 25px;
            animation: fadeUp 0.6s ease;
        }

        .form-success.show {
            display: block;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-success .success-icon {
            font-size: 3.5rem;
            color: #2ecc71;
            display: block;
            margin-bottom: 10px;
        }

        .form-success h3 {
            color: #2ecc71;
            font-size: 1.6rem;
            margin-bottom: 8px;
        }

        .form-success p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            margin-bottom: 18px;
        }

        .form-success .btn-success {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 30px;
            background: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
            border-radius: 50px;
            font-weight: 700;
            font-family: var(--font-arabic);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .form-success .btn-success:hover {
            background: var(--gold);
            color: var(--primary-dark);
        }

        /* ============================================================
           TOAST
           ============================================================ */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 28px;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            z-index: 10001;
            transform: translateX(120%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow);
            font-family: var(--font-arabic);
            backdrop-filter: blur(20px);
            max-width: 420px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .toast.error {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        .toast.info {
            background: linear-gradient(135deg, var(--primary-blue), #0A1128);
            border: 1px solid var(--gold);
        }

           FOOTER
           ============================================================ */
        .footer {
            padding: 25px 0;
            text-align: center;

            position: relative;
            z-index: 1;
            margin-top: auto;
            background: rgba(10, 17, 40, 0.3);
        }

        .footer p {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.85rem;
        }

        .footer a {
            color: var(--gold);
            transition: var(--transition);
        }

        .footer a:hover {
            color: var(--orange);
        }

        /* ============================================================
           FLOATING BUTTONS (صغيرة)
           ============================================================ */
        .floating-buttons {
            position: fixed;
            left: 20px;
            bottom: 30px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .floating-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .floating-btn:hover {
            transform: scale(1.12);
        }

        .floating-btn.whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
        }

        .floating-btn.whatsapp::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid #25D366;
            animation: pulse-ring 2s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .floating-btn.phone {
            background: linear-gradient(135deg, var(--orange), #E65100);
        }

        .floating-btn.request {
            background: linear-gradient(135deg, var(--gold), var(--orange));
            color: var(--primary-dark);
        }

        .floating-btn {
            position: relative;
        }

        .floating-btn .tooltip {
            position: absolute;
            right: 60px;
            background: rgba(10, 17, 40, 0.95);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 5px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            font-family: var(--font-arabic);
            border: 1px solid var(--glass-border);
        }

        .floating-btn:hover .tooltip {
            opacity: 1;
            transform: translateX(-5px);
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            .request-header h1 {
                font-size: 1.8rem;
            }
            .request-form .form-row {
                grid-template-columns: 1fr;
            }
            .request-form {
                padding: 24px;
            }
            .navbar .logo .logo-wrapper {
                width: 36px;
                height: 36px;
            }
            .navbar .logo .brand-text {
                font-size: 1.1rem;
            }
            .navbar .back-link span {
                display: none;
            }
            .navbar .back-link i {
                font-size: 1.2rem;
            }
            .floating-buttons {
                left: 12px;
                bottom: 20px;
            }
            .floating-btn {
                width: 44px;
                height: 44px;
                font-size: 1.1rem;
            }
            .floating-btn .tooltip {
                display: none;
            }
            .toast {
                max-width: 90%;
                font-size: 0.9rem;
                padding: 14px 20px;
            }
        }

        @media (max-width: 480px) {
            .request-header h1 {
                font-size: 1.5rem;
            }
            .request-form {
                padding: 16px;
            }
            .request-form input,
            .request-form select,
            .request-form textarea {
                padding: 12px 14px;
                font-size: 0.9rem;
            }
            .btn-submit {
                font-size: 1rem;
                padding: 14px;
            }
            .main {
                padding: 90px 12px 90px;
            }
            .request-header .icon-wrapper {
                width: 60px;
                height: 60px;
            }
            .request-header .icon-wrapper .icon {
                font-size: 2rem;
            }
        }
    </style>
</head>

    <script>
        // ============================================================
        // 1. AOS
        // ============================================================
        AOS.init({ once: true, duration: 800 });

        // ============================================================
        // 2. Particles
        // ============================================================
        (function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.speedY = (Math.random() - 0.5) * 0.4;
                    this.opacity = Math.random() * 0.4 + 0.05;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) {
                        this.reset();
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 215, 0, ${this.opacity})`;
                    ctx.fill();
                }
            }

            const count = Math.min(60, Math.floor((w * h) / 20000));
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update();
                    p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // ============================================================
        // 3. Areas List
        // ============================================================
        const AREAS = [
            // Alexandria - East
            'المنتزه', 'سيدي بشر', 'ميامي', 'كليوباترا', 'الشاطبي',
            'الابراهيمية', 'زيزينيا', 'سبورتنج', 'سموحة', 'كامب شيزار',
            'جناكليس', 'فيكتوريا', 'الرمل',
            // Alexandria - West
            'بحري', 'العجمي', 'محرم بك', 'القباري', 'الدخيلة',
            'العامرية', 'برج العرب', 'الورديان',
            // Alexandria - Central / North
            'الظاهرية', 'العطارين', 'المنشية', 'الحضرة', 'السيوف',
            'الانفوشي', 'القلعة', 'كوم الدكة',
            // North Coast
            'مراسى', 'العلمين', 'سيدي عبد الرحمن', 'رأس الحكمة',
            'الضبعة', 'الحمام', 'مطروح', 'السلوم', 'سيدي براني',
            'النجيلة', 'فوكة', 'مارينا', 'جرين بيتش', 'سان ستيفانو',
            'كريستال بيتش'
        ];

        const areaSelect = document.getElementById('area');
        AREAS.forEach(area => {
            const opt = document.createElement('option');
            opt.value = area;
            opt.textContent = area;
            areaSelect.appendChild(opt);
        });

        // ============================================================
        // 4. Supabase Configuration
        // ============================================================
        const SUPABASE_URL = 'https://uzcllseejydmpwzsygjp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6Y2xsc2VlanlkbXB3enN5Z2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3MTM5MzMsImV4cCI6MjEwMDI4OTkzM30.uRxevCNLHM2OSqCRBcnmOHsmhFOgSiphBqKGaw261wA';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================================
        // 5. Toast
        // ============================================================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toast._hideTimeout);
            toast._hideTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 5000);
        }

        // ============================================================
        // 6. GPS Location
        // ============================================================
        const gpsBtn = document.getElementById('gpsBtn');

        gpsBtn.addEventListener('click', function() {
            const icon = this.querySelector('i');
            icon.className = 'fas fa-spinner fa-spin';
            this.disabled = true;

            if (!navigator.geolocation) {
                showToast('متصفحك لا يدعم تحديد الموقع', 'error');
                icon.className = 'fas fa-location-dot';
                this.disabled = false;
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    try {
                        const resp = await fetch(
                            `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json&accept-language=ar`
                        );
                        const data = await resp.json();
                        let matchedArea = '';

                        if (data && data.address) {
                            const parts = [];
                            if (data.address.city) parts.push(data.address.city);
                            if (data.address.town) parts.push(data.address.town);
                            if (data.address.village) parts.push(data.address.village);
                            if (data.address.suburb) parts.push(data.address.suburb);
                            if (data.address.road) parts.push(data.address.road);
                            const locationName = parts.join(' - ') || data.display_name || '';

                            // Try exact match first
                            for (const area of AREAS) {
                                if (locationName.includes(area)) {
                                    matchedArea = area;
                                    break;
                                }
                            }

                            // Try partial match
                            if (!matchedArea) {
                                for (const area of AREAS) {
                                    if (locationName.includes(area.substring(0, 3))) {
                                        matchedArea = area;
                                        break;
                                    }
                                }
                            }

                            // Try to get city name
                            if (!matchedArea) {
                                const city = data.address.city || data.address.town || data.address.village;
                                if (city) {
                                    for (const area of AREAS) {
                                        if (area.includes(city) || city.includes(area)) {
                                            matchedArea = area;
                                            break;
                                        }
                                    }
                                }
                            }
                        }

                        if (matchedArea) {
                            document.getElementById('area').value = matchedArea;
                            showToast(`✅ تم تحديد منطقتك: ${matchedArea}`, 'success');
                        } else {
                            showToast('📍 تعذر تحديد المنطقة، اخترها يدوياً', 'info');
                        }
                    } catch (e) {
                        showToast('❌ حدث خطأ في تحديد الموقع', 'error');
                    }
                    icon.className = 'fas fa-location-dot';
                    this.disabled = false;
                },
                () => {
                    showToast('يرجى السماح بتحديد الموقع أو اختيار المنطقة يدوياً', 'info');
                    icon.className = 'fas fa-location-dot';
                    this.disabled = false;
                }, { enableHighAccuracy: true, timeout: 10000 }
            );
        });

        // Try auto-location after 1.5 seconds
        setTimeout(() => gpsBtn.click(), 1500);

        // ============================================================
        // 7. Form Submit to Supabase
        // ============================================================
        const form = document.getElementById('requestForm');
        const submitBtn = document.getElementById('submitBtn');
        const successDiv = document.getElementById('formSuccess');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const area = document.getElementById('area').value;
            const problem = document.getElementById('problem').value.trim();

            // Validation
            if (!fullName || fullName.length < 3) {
                showToast('⚠️ الاسم مطلوب (3 أحرف على الأقل)', 'error');
                document.getElementById('fullName').focus();
                return;
            }

            if (!phone || phone.length < 10) {
                showToast('⚠️ رقم التليفون غير صحيح', 'error');
                document.getElementById('phone').focus();
                return;
            }

            if (!area) {
                showToast('⚠️ يرجى اختيار المنطقة', 'error');
                document.getElementById('area').focus();
                return;
            }

            // Loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            successDiv.classList.remove('show');

            try {
                const { data, error } = await supabase
                    .from('maintenance_requests')
                    .insert([{
                        full_name: fullName,
                        phone: phone,
                        address: address || null,
                        area: area,
                        problem_description: problem || null,
                        status: 'جديد',
                        created_at: new Date().toISOString()
                    }])
                    .select();

                if (error) {
                    console.error('Supabase Error:', error);
                    throw error;
                }

                // Success
                successDiv.classList.add('show');
                showToast('✅ تم إرسال طلبك بنجاح! سنتواصل معك خلال 30 دقيقة.', 'success');

                // Reset form
                form.reset();

                // Scroll to success message
                successDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });

            } catch (err) {
                console.error('Error:', err);
                showToast('❌ حدث خطأ أثناء إرسال الطلب. يرجى المحاولة مرة أخرى.', 'error');
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });

        // ============================================================
        // 8. Handle logo error
        // ============================================================
        document.querySelectorAll('img[src="logo.png"]').forEach(img => {
            img.addEventListener('error', function() {
                this.style.display = 'none';
                const wrapper = this.closest('.logo-wrapper');
                if (wrapper) {
                    const fallback = document.createElement('div');
                    fallback.style.cssText = `
                                width: 100%;
                                height: 100%;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                background: linear-gradient(135deg, var(--gold), var(--orange));
                                color: var(--primary-dark);
                                font-size: 1.3rem;
                                font-weight: 900;
                                border-radius: 50%;
                            `;
                    fallback.textContent = 'T';
                    wrapper.appendChild(fallback);
                }
            });
        });

        // ============================================================
        // 9. Keyboard shortcuts
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const toast = document.getElementById('toast');
                toast.classList.remove('show');
            }
        });

        console.log('📝 TopLoad - صفحة طلب الصيانة');
        console.log('📍 مناطق مخدومة:', AREAS.length);
        console.log('🔗 Supabase متصل:', !!supabase);
    </script>
</body>
</html>
