<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة تحكم طلبات الصيانة - TopLoad</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0e1a;
            color: #f0f4fa;
            min-height: 100vh;
            padding: 20px;
        }
        
        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #D4A843, #E85D3A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 i {
            -webkit-text-fill-color: #D4A843;
        }
        .header-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .stat-box {
            background: rgba(212, 168, 67, 0.08);
            border: 1px solid rgba(212, 168, 67, 0.15);
            border-radius: 12px;
            padding: 10px 20px;
            text-align: center;
            min-width: 80px;
        }
        .stat-box .number {
            font-size: 24px;
            font-weight: 800;
            color: #D4A843;
        }
        .stat-box .label {
            font-size: 12px;
            color: #8a94a8;
        }
        
        /* Filters */
        .filters {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .filters input, .filters select {
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #f0f4fa;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            min-width: 150px;
            flex: 1;
            outline: none;
            transition: all 0.3s;
        }
        .filters input:focus, .filters select:focus {
            border-color: #D4A843;
            box-shadow: 0 0 0 3px rgba(212, 168, 67, 0.1);
        }
        .filters input::placeholder {
            color: #5a6a7e;
        }
        .filters select option {
            background: #1a1e2e;
            color: #f0f4fa;
        }
        .btn-refresh {
            padding: 10px 25px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #D4A843, #E85D3A);
            color: #0a0e1a;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-refresh:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(212, 168, 67, 0.3);
        }
        
        /* Table */
        .table-container {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }
        thead {
            background: rgba(212, 168, 67, 0.08);
        }
        th {
            padding: 15px 18px;
            text-align: right;
            font-weight: 700;
            color: #D4A843;
            border-bottom: 2px solid rgba(212, 168, 67, 0.15);
            font-size: 14px;
            white-space: nowrap;
        }
        td {
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 14px;
            vertical-align: middle;
        }
        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .status-badge {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
        }
        .status-new {
            background: rgba(212, 168, 67, 0.15);
            color: #D4A843;
        }
        .status-progress {
            background: rgba(44, 95, 138, 0.15);
            color: #2C5F8A;
        }
        .status-done {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf84;
        }
        .status-cancel {
            background: rgba(244, 67, 54, 0.15);
            color: #f44336;
        }
        .status-badge i {
            margin-left: 5px;
        }
        .phone-link {
            color: #D4A843;
            text-decoration: none;
            direction: ltr;
            display: inline-block;
        }
        .phone-link:hover {
            text-decoration: underline;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #5a6a7e;
        }
        .empty-state i {
            font-size: 50px;
            margin-bottom: 15px;
            color: #2a3a4e;
        }
        .loading-state {
            text-align: center;
            padding: 60px 20px;
        }
        .loading-state .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(212, 168, 67, 0.1);
            border-top: 4px solid #D4A843;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 380px;
            width: 90%;
        }
        .toast {
            padding: 14px 20px;
            border-radius: 14px;
            background: rgba(20, 25, 45, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease;
        }
        .toast.success { border-right: 4px solid #4caf84; }
        .toast.error { border-right: 4px solid #f44336; }
        .toast.info { border-right: 4px solid #2C5F8A; }
        .toast i { font-size: 20px; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .header-stats {
                justify-content: center;
            }
            .filters {
                flex-direction: column;
            }
            .filters input, .filters select {
                min-width: 100%;
            }
            .btn-refresh {
                width: 100%;
                justify-content: center;
            }
            th, td {
                padding: 10px 12px;
                font-size: 13px;
            }
        }
        @media (max-width: 480px) {
            body { padding: 10px; }
            .header h1 { font-size: 22px; }
            .stat-box .number { font-size: 20px; }
        }
    </style>
</head>
<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Header -->
    <div class="header">
        <h1>
            <i class="fas fa-clipboard-list"></i>
            طلبات الصيانة
        </h1>
        <div class="header-stats">
            <div class="stat-box">
                <div class="number" id="totalCount">0</div>
                <div class="label">إجمالي الطلبات</div>
            </div>
            <div class="stat-box">
                <div class="number" id="newCount">0</div>
                <div class="label">جديدة</div>
            </div>
            <div class="stat-box">
                <div class="number" id="progressCount">0</div>
                <div class="label">قيد التنفيذ</div>
            </div>
            <div class="stat-box">
                <div class="number" id="doneCount">0</div>
                <div class="label">مكتملة</div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="filters">
        <input type="text" id="searchInput" placeholder="🔍 بحث بالاسم أو رقم التليفون..." />
        <select id="statusFilter">
            <option value="">جميع الحالات</option>
            <option value="جديد">جديد</option>
            <option value="قيد التنفيذ">قيد التنفيذ</option>
            <option value="مكتمل">مكتمل</option>
            <option value="ملغي">ملغي</option>
        </select>
        <select id="sortFilter">
            <option value="newest">الأحدث أولاً</option>
            <option value="oldest">الأقدم أولاً</option>
        </select>
        <button class="btn-refresh" id="refreshBtn">
            <i class="fas fa-sync-alt"></i> تحديث
        </button>
    </div>

    <!-- Table -->
    <div class="table-container">
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p style="margin-top:15px;color:#5a6a7e;">جاري تحميل البيانات...</p>
        </div>
        <div id="tableWrapper" style="display:none;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الاسم</th>
                        <th>رقم التليفون</th>
                        <th>العنوان</th>
                        <th>المشكلة</th>
                        <th>الحالة</th>
                        <th>تاريخ الطلب</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
        <div id="emptyState" class="empty-state" style="display:none;">
            <i class="fas fa-inbox"></i>
            <p>لا توجد طلبات لعرضها</p>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        (function() {
            'use strict';

            // ========== SUPABASE CONFIG ==========
            const supabaseUrl = 'https://uzcllseejydmpwzsygjp.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6Y2xsc2VlanlkbXB3enN5Z2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3MTM5MzMsImV4cCI6MjEwMDI4OTkzM30.uRxevCNLHM2OSqCRBcnmOHsmhFOgSiphBqKGaw261wA';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            // ========== DOM REFS ==========
            const tableBody = document.getElementById('tableBody');
            const loadingState = document.getElementById('loadingState');
            const tableWrapper = document.getElementById('tableWrapper');
            const emptyState = document.getElementById('emptyState');
            const searchInput = document.getElementById('searchInput');
            const statusFilter = document.getElementById('statusFilter');
            const sortFilter = document.getElementById('sortFilter');
            const refreshBtn = document.getElementById('refreshBtn');
            const toastContainer = document.getElementById('toastContainer');

            // Stats elements
            const totalCount = document.getElementById('totalCount');
            const newCount = document.getElementById('newCount');
            const progressCount = document.getElementById('progressCount');
            const doneCount = document.getElementById('doneCount');

            // ========== TOAST ==========
            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icons = {
                    success: 'fa-check-circle',
                    error: 'fa-times-circle',
                    info: 'fa-info-circle'
                };
                toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${message}`;
                toastContainer.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            }

            // ========== FORMAT DATE ==========
            function formatDate(dateStr) {
                if (!dateStr) return '-';
                try {
                    const date = new Date(dateStr);
                    return date.toLocaleDateString('ar-EG', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                } catch {
                    return dateStr;
                }
            }

            // ========== GET STATUS BADGE ==========
            function getStatusBadge(status) {
                const statusMap = {
                    'جديد': { class: 'status-new', icon: 'fa-clock' },
                    'قيد التنفيذ': { class: 'status-progress', icon: 'fa-spinner' },
                    'مكتمل': { class: 'status-done', icon: 'fa-check' },
                    'ملغي': { class: 'status-cancel', icon: 'fa-times' }
                };
                const s = statusMap[status] || statusMap['جديد'];
                return `<span class="status-badge ${s.class}"><i class="fas ${s.icon}"></i> ${status || 'جديد'}</span>`;
            }

            // ========== LOAD DATA ==========
            async function loadRequests() {
                // Show loading
                loadingState.style.display = 'block';
                tableWrapper.style.display = 'none';
                emptyState.style.display = 'none';

                try {
                    // Build query
                    let query = supabase
                        .from('maintenance_requests')
                        .select('*')
                        .order('created_at', { ascending: false });

                    // Apply filters
                    const searchVal = searchInput.value.trim();
                    if (searchVal) {
                        // Search by name or phone
                        query = query.or(`full_name.ilike.%${searchVal}%,phone.ilike.%${searchVal}%`);
                    }

                    const statusVal = statusFilter.value;
                    if (statusVal) {
                        query = query.eq('status', statusVal);
                    }

                    const sortVal = sortFilter.value;
                    if (sortVal === 'oldest') {
                        query = query.order('created_at', { ascending: true });
                    } else {
                        query = query.order('created_at', { ascending: false });
                    }

                    const { data, error } = await query;

                    if (error) throw error;

                    // Update stats
                    updateStats(data);

                    // Render table
                    renderTable(data);

                } catch (err) {
                    console.error('Error loading data:', err);
                    showToast('حدث خطأ في تحميل البيانات: ' + err.message, 'error');
                    loadingState.style.display = 'none';
                    emptyState.style.display = 'block';
                    emptyState.innerHTML = `
                        <i class="fas fa-exclamation-triangle" style="color:#f44336;"></i>
                        <p>حدث خطأ في تحميل البيانات</p>
                        <p style="font-size:13px;color:#5a6a7e;">${err.message}</p>
                    `;
                }
            }

            // ========== UPDATE STATS ==========
            function updateStats(data) {
                const total = data.length;
                const newRequests = data.filter(r => r.status === 'جديد').length;
                const progress = data.filter(r => r.status === 'قيد التنفيذ').length;
                const done = data.filter(r => r.status === 'مكتمل').length;

                totalCount.textContent = total;
                newCount.textContent = newRequests;
                progressCount.textContent = progress;
                doneCount.textContent = done;
            }

            // ========== RENDER TABLE ==========
            function renderTable(data) {
                loadingState.style.display = 'none';

                if (!data || data.length === 0) {
                    tableWrapper.style.display = 'none';
                    emptyState.style.display = 'block';
                    emptyState.innerHTML = `
                        <i class="fas fa-inbox"></i>
                        <p>لا توجد طلبات لعرضها</p>
                    `;
                    return;
                }

                tableWrapper.style.display = 'block';
                emptyState.style.display = 'none';

                let html = '';
                data.forEach((row, index) => {
                    html += `
                        <tr>
                            <td>${index + 1}</td>
                            <td><strong>${escapeHtml(row.full_name || '-')}</strong></td>
                            <td>
                                <a href="tel:${row.phone}" class="phone-link">
                                    <i class="fas fa-phone" style="color:#D4A843;font-size:12px;"></i>
                                    ${escapeHtml(row.phone || '-')}
                                </a>
                            </td>
                            <td style="max-width:180px;word-break:break-word;">${escapeHtml(row.address || '-')}</td>
                            <td style="max-width:200px;word-break:break-word;font-size:13px;color:#ccd9f0;">
                                ${escapeHtml(row.problem_description || '-')}
                            </td>
                            <td>${getStatusBadge(row.status)}</td>
                            <td style="font-size:12px;color:#8a94a8;white-space:nowrap;">
                                ${formatDate(row.created_at)}
                            </td>
                            <td>
                                <button class="status-btn" data-id="${row.id}" data-status="${row.status}" 
                                        style="background:rgba(212,168,67,0.1);border:1px solid rgba(212,168,67,0.2);
                                               border-radius:8px;padding:6px 12px;color:#D4A843;cursor:pointer;
                                               font-family:'Cairo',sans-serif;font-size:12px;transition:0.3s;"
                                        onmouseover="this.style.background='rgba(212,168,67,0.2)'"
                                        onmouseout="this.style.background='rgba(212,168,67,0.1)'">
                                    <i class="fas fa-edit"></i> تغيير الحالة
                                </button>
                            </td>
                        </tr>
                    `;
                });

                tableBody.innerHTML = html;

                // Add event listeners to status buttons
                document.querySelectorAll('.status-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = this.dataset.id;
                        const currentStatus = this.dataset.status;
                        showStatusMenu(id, currentStatus, this);
                    });
                });
            }

            // ========== ESCAPE HTML ==========
            function escapeHtml(text) {
                if (!text) return '-';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // ========== STATUS MENU ==========
            function showStatusMenu(id, currentStatus, button) {
                const statuses = ['جديد', 'قيد التنفيذ', 'مكتمل', 'ملغي'];
                const menu = document.createElement('div');
                menu.style.cssText = `
                    position: fixed;
                    background: #1a1e2e;
                    border: 1px solid rgba(212,168,67,0.2);
                    border-radius: 12px;
                    padding: 8px 0;
                    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
                    z-index: 1000;
                    min-width: 150px;
                `;

                const rect = button.getBoundingClientRect();
                menu.style.top = (rect.bottom + 8) + 'px';
                menu.style.left = (rect.left - 50) + 'px';

                statuses.forEach(status => {
                    if (status === currentStatus) return;
                    const item = document.createElement('div');
                    item.textContent = status;
                    item.style.cssText = `
                        padding: 10px 20px;
                        cursor: pointer;
                        color: #f0f4fa;
                        transition: 0.2s;
                        font-family: 'Cairo', sans-serif;
                        font-size: 14px;
                    `;
                    item.onmouseover = () => { item.style.background = 'rgba(212,168,67,0.1)'; };
                    item.onmouseout = () => { item.style.background = 'transparent'; };
                    item.onclick = async () => {
                        menu.remove();
                        await updateStatus(id, status);
                    };
                    menu.appendChild(item);
                });

                // Close menu on click outside
                document.addEventListener('click', function closeMenu(e) {
                    if (!menu.contains(e.target) && e.target !== button) {
                        menu.remove();
                        document.removeEventListener('click', closeMenu);
                    }
                });

                document.body.appendChild(menu);
            }

            // ========== UPDATE STATUS ==========
            async function updateStatus(id, newStatus) {
                try {
                    const { error } = await supabase
                        .from('maintenance_requests')
                        .update({ status: newStatus })
                        .eq('id', id);

                    if (error) throw error;

                    showToast(`تم تحديث الحالة إلى "${newStatus}"`, 'success');
                    loadRequests(); // Refresh data

                } catch (err) {
                    console.error('Error updating status:', err);
                    showToast('فشل تحديث الحالة: ' + err.message, 'error');
                }
            }

            // ========== REFRESH ==========
            refreshBtn.addEventListener('click', function() {
                const icon = this.querySelector('i');
                icon.classList.add('fa-spin');
                loadRequests().finally(() => {
                    setTimeout(() => icon.classList.remove('fa-spin'), 500);
                });
            });

            // ========== DEBOUNCE SEARCH ==========
            let searchTimeout;
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => loadRequests(), 400);
            });

            statusFilter.addEventListener('change', loadRequests);
            sortFilter.addEventListener('change', loadRequests);

            // ========== INIT ==========
            loadRequests();

            // Auto-refresh every 30 seconds
            setInterval(() => {
                loadRequests();
            }, 30000);

            // ========== KEYBOARD SHORTCUTS ==========
            document.addEventListener('keydown', (e) => {
                // F5 or Ctrl+R to refresh
                if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
                    e.preventDefault();
                    refreshBtn.click();
                }
                // Escape to clear search
                if (e.key === 'Escape') {
                    searchInput.value = '';
                    loadRequests();
                }
            });

        })();
    </script>
</body>
</html>
